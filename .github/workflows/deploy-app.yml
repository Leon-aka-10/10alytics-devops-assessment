name: Build, Test & Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-test:
    name: Lint and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Lint
        run: flake8 app/ --max-line-length=120

      - name: Run tests
        run: |
          pip install pytest-cov
          pytest app/tests/ --cov=app --cov-report=term-missing

  provision:
    name: Provision infrastructure
    runs-on: ubuntu-latest
    needs: lint-test
    outputs:
      app_name: ${{ steps.tf_output.outputs.app_name }}
      app_url: ${{ steps.tf_output.outputs.app_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure CLI login
        run: |
          az login \
            --username "${{ secrets.AZURE_USERNAME }}" \
            --password "${{ secrets.AZURE_PASSWORD }}"
          az account set \
            --subscription "3088b175-92ef-4dd7-9020-ee7ae696fd1a"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.x"

      - name: Terraform init
        env:
          ARM_ACCESS_KEY: ${{ secrets.ARM_ACCESS_KEY }}
        run: terraform init
        working-directory: terraform/

      - name: Terraform apply
        env:
          ARM_ACCESS_KEY: ${{ secrets.ARM_ACCESS_KEY }}
        run: |
          terraform apply -auto-approve \
            -var="db_admin=${{ secrets.DB_ADMIN }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}"
        working-directory: terraform/

      - name: Capture outputs
        id: tf_output
        env:
          ARM_ACCESS_KEY: ${{ secrets.ARM_ACCESS_KEY }}
        run: |
          echo "app_name=$(terraform output -raw app_name)" >> $GITHUB_OUTPUT
          echo "app_url=$(terraform output -raw app_url)" >> $GITHUB_OUTPUT
        working-directory: terraform/

  deploy:
    name: Deploy application
    runs-on: ubuntu-latest
    needs: provision

    steps:
      - uses: actions/checkout@v4

      - name: Azure CLI login
        run: |
          az login \
            --username "${{ secrets.AZURE_USERNAME }}" \
            --password "${{ secrets.AZURE_PASSWORD }}"
          az account set \
            --subscription "3088b175-92ef-4dd7-9020-ee7ae696fd1a"

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ needs.provision.outputs.app_name }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./app

      - name: Verify health endpoint
        run: |
          APP_URL="${{ needs.provision.outputs.app_url }}"
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${APP_URL}/health")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed on attempt $i"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — waiting 15s..."
            sleep 15
          done
          echo "Health check failed after 10 attempts"
          exit 1